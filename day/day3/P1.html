<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML tables</title>
</head>
<body>
    <p>tr= table row
        th=table header
        td=table data
    </p>
    <p>HTML tables</p>
    <table border="1">
        <caption>Monthly savings report</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>January</td>
            <td>20000</td>
        </tr>
        <tr>
            <td>jul</td>
            <td>75000</td>
        </tr>
    </table>

    <table border="1">
        <caption>sales data</caption>
        <thead>
    
            <tr>
                <th>Month</th>
                <th>Sales</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>2000000</td>
            </tr>
            <tr>
                <td>jul</td>
                <td>25000000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
         
</body>
</html>
